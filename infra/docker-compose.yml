services:
  auth-db:
    image: postgres:16-alpine
    container_name: quickwheels-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - quickwheels-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  vehicle-db:
    image: postgres:16-alpine
    container_name: quickwheels-vehicle-db
    environment:
      POSTGRES_DB: ${VEHICLE_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vehicle_db_data:/var/lib/postgresql/data
    networks:
      - quickwheels-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${VEHICLE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  auth-service:
    image: yujiro2hanma/quickwheels-auth:latest
    container_name: quickwheels-auth-service
    environment:
      - DefaultConnection=Host=auth-db;Port=5432;Database=${AUTH_DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - SecretKey=${JWT_SECRET_KEY}
      - Issuer=${JWT_ISSUER}
      - Audience=${JWT_AUDIENCE}
      - ExpirationMinutes=${JWT_EXPIRATION_MINUTES}
      - RefreshTokenExpirationDays=${JWT_REFRESH_EXPIRATION_DAYS}
      - SmtpHost=${SMTP_HOST}
      - SmtpPort=${SMTP_PORT}
      - SmtpUsername=${SMTP_USERNAME}
      - SmtpPassword=${SMTP_PASSWORD}
      - FromEmail=${FROM_EMAIL}
      - FromName=${FROM_NAME}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_S3_SIGNED_URL_EXPIRY_MINUTES=${AWS_S3_SIGNED_URL_EXPIRY_MINUTES}
    networks:
      - quickwheels-network
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  vehicle-service:
    image: yujiro2hanma/quickwheels-vehicle:latest
    container_name: quickwheels-vehicle-service
    environment:
      - DefaultConnection=Host=vehicle-db;Port=5432;Database=${VEHICLE_DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - SecretKey=${JWT_SECRET_KEY}
      - Issuer=${JWT_ISSUER}
      - Audience=${JWT_AUDIENCE}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_S3_SIGNED_URL_EXPIRY_MINUTES=${AWS_S3_SIGNED_URL_EXPIRY_MINUTES}
    networks:
      - quickwheels-network
    depends_on:
      vehicle-db:
        condition: service_healthy
    restart: unless-stopped

  client:
    image: yujiro2hanma/quickwheels-client:latest
    container_name: quickwheels-client
    networks:
      - quickwheels-network
    depends_on:
      - auth-service
      - vehicle-service
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: quickwheels-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - quickwheels-network
    depends_on:
      - client
    restart: unless-stopped

volumes:
  auth_db_data:
  vehicle_db_data:

networks:
  quickwheels-network:
    driver: bridge
