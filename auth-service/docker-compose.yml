  postgres:
    image: postgres:16-alpine
    container_name: quickwheels-auth-postgres
    environment:
      POSTGRES_DB: quickwheels_auth_db
      POSTGRES_USER: quickwheels_admin
      POSTGRES_PASSWORD: QuickWheels2025Dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quickwheels-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U quickwheels_admin -d quickwheels_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quickwheels-auth-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quickwheels.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - quickwheels-network
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  quickwheels-network:
    driver: bridge
