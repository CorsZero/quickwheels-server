version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quickwheels-booking-postgres
    environment:
      POSTGRES_DB: quickwheels_booking_db
      POSTGRES_USER: quickwheels_admin
      POSTGRES_PASSWORD: QuickWheels2025Dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quickwheels-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U quickwheels_admin -d quickwheels_booking_db",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: quickwheels_booking_postgres_data
    driver: local

networks:
  quickwheels-network:
    driver: bridge
